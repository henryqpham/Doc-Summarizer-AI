<!doctype html>
<!--
  This is a BUILD TEMPLATE, not meant to be opened directly.
  `npm run build` replaces the three BUILD: markers below with inlined CSS,
  the bundled libraries, and all app code, producing dist/summarizer.html.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Document Summarizer</title>
    <style>/* BUILD:STYLES */</style>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Document Summarizer</h1>
        <p class="app__subtitle">
          Drag a document below. Nothing is saved — it stays on this machine.
        </p>
      </header>

      <section
        id="dropzone"
        class="dropzone"
        role="button"
        tabindex="0"
        aria-label="Drop a document or click to choose a file"
      >
        <p class="dropzone__hint">Drop a PDF, DOCX, TXT, or MD file here</p>
        <p class="dropzone__sub">or click to choose a file</p>
        <input
          id="filepicker"
          class="dropzone__input"
          type="file"
          accept=".pdf,.docx,.txt,.md"
          hidden
        />
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <section class="output">
        <div class="output__bar">
          <label for="output" class="output__label">Summary</label>
          <div class="output__actions">
            <button id="copy" class="btn btn--primary" type="button">Copy</button>
            <button id="clear" class="btn" type="button">Clear</button>
          </div>
        </div>
        <textarea
          id="output"
          class="output__text"
          rows="16"
          placeholder="The formatted summary will appear here…"
          spellcheck="false"
        ></textarea>
      </section>

      <footer class="app__footer">
        No data is stored or sent anywhere except your approved model endpoint.
      </footer>
    </main>

    <!-- BUILD:VENDOR -->
    <!-- BUILD:APP -->
  </body>
</html>
